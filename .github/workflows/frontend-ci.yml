name: Frontend CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches: [main, master]
    paths:
      - "FrontEnd/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "FrontEnd/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  frontend-ci:
    name: Lint, Typecheck, Format, Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FrontEnd/my-app

    steps:
      #  Checkout repo
      - uses: actions/checkout@v4

      #  Setup Node
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: FrontEnd/my-app/package-lock.json

      #  Install dependencies
      - name: Install dependencies
        run: npm ci

      #  Lint
      - name: Lint
        run: npm run lint

      #  Type check (use your script )
      - name: Type check
        run: npm run typecheck

      #  Validate path aliases (important in your project)
      - name: Validate path aliases
        run: npm run validate:path-aliases

      #  Prettier formatting check
      - name: Format check
        run: npm run format:check

      #  Run tests (Vitest )
      - name: Tests
        run: npm run test

      #  Build Next.js app
      - name: Build
        run: npm run build

      - name: Workflow Summary
        if: always()
        run: |
          echo "## Frontend CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Path Aliases | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Format Check | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ job.status }}" != "success" ]; then
            echo "### ❌ Failed Frontend Checks" >> $GITHUB_STEP_SUMMARY
            echo "Frontend CI failed. Please check the job logs for details on failed test suites or linting issues." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ All Frontend Checks Passed" >> $GITHUB_STEP_SUMMARY
            echo "All frontend CI checks completed successfully including lint, typecheck, tests, and build." >> $GITHUB_STEP_SUMMARY
          fi